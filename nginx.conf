server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # SPA history fallback — route everything to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for hashed/immutable assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache the entry HTML so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
